<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><title>Yönetim Girişi - Karaca Dental</title>
    <link rel="icon" type="image/png" href="images/favicon.png"><link rel="stylesheet" href="style.css">
    <style>.login-box { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; } .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; }</style>
</head>
<body>
    <div class="login-box">
        <h2>🔒 Yönetim Paneli</h2><p style="color: #64748b; margin-bottom: 20px;">Giriş Bilgilerinizi Yazın</p>
        <input type="text" id="username" placeholder="Kullanıcı Adı"><input type="password" id="password" placeholder="Şifre">
        <button class="btn-detail" style="width:100%; border:none; cursor:pointer;" onclick="girişAksiyonu()">Giriş Yap</button>
        <p id="hata" style="color:#ef4444; margin-top:10px; display:none;">Hatalı kullanıcı adı veya şifre!</p>
    </div>
    <script>
        function girişAksiyonu() {
            if(document.getElementById('username').value === 'ssbilgi.com' && document.getElementById('password').value === '1999') {
                window.location.href = 'admin.html';
            } else { document.getElementById('hata').style.display = 'block'; }
        }
    </script>
</body>
</html>
